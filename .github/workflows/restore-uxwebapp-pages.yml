name: Restore UX web app (Sports World + voice agent) to GitHub Pages

on:
  push:
    branches: ["claude/final-edge-ai-website-g3axke"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload the UX web app (with the voice-agent demo)
        uses: actions/upload-pages-artifact@v3
        with:
          path: resultados/ux-v1/webapp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
